<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Noto+Sans+JP:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="sakura-bg" class="sakura-container"></div>
  
  <div class="popup-container">
    <header class="header">
      <div class="brand">🌸 KotobaTab</div>
      <button id="btn-favorites-page" class="icon-button" title="Ir para Favoritos">🔖</button>
    </header>

    <main class="content" id="phrase-container">
      <div class="phrase-jp japanese-text" id="text-jp">...</div>
      <div class="phrase-romaji" id="text-romaji">...</div>
      <div class="phrase-pt" id="text-pt">...</div>
    </main>

    <footer class="actions">
      <button class="btn" id="btn-favorite">
        <span class="btn-icon" id="icon-favorite">⭐</span>
        Favoritar
      </button>
      <button class="btn" id="btn-listen">
        <span class="btn-icon">🔊</span>
        Ouvir
      </button>
      <button class="btn" id="btn-new">
        <span class="btn-icon">🔄</span>
        Nova frase
      </button>
    </footer>
    <footer class="footer"><span data-i18n="developedBy">Desenvolvido por</span> <a href="https://github.com/HttpsNatty" target="_blank" rel="noopener noreferrer">Natty</a></footer>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
